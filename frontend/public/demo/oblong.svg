<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <rect width="120" height="140" fill="#f4f4f5" rx="16"/>
  <!-- oblong: tall narrow ellipse -->
  <ellipse cx="60" cy="72" rx="26" ry="50" fill="#d4d4d8" stroke="#a1a1aa" stroke-width="2"/>
  <!-- eyes -->
  <ellipse cx="50" cy="64" rx="4" ry="3" fill="#71717a"/>
  <ellipse cx="70" cy="64" rx="4" ry="3" fill="#71717a"/>
  <!-- nose -->
  <line x1="60" y1="71" x2="57" y2="81" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="71" x2="63" y2="81" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- mouth -->
  <path d="M52 92 Q60 98 68 92" stroke="#a1a1aa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="60" y="134" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#71717a">Oblong</text>
</svg>
