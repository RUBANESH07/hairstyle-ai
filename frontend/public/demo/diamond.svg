<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <rect width="120" height="140" fill="#f4f4f5" rx="16"/>
  <!-- diamond: narrow top & bottom, wide middle -->
  <path d="M60 20 Q82 30 94 60 Q82 100 60 118 Q38 100 26 60 Q38 30 60 20Z"
    fill="#d4d4d8" stroke="#a1a1aa" stroke-width="2"/>
  <!-- eyes -->
  <ellipse cx="47" cy="62" rx="5" ry="3" fill="#71717a"/>
  <ellipse cx="73" cy="62" rx="5" ry="3" fill="#71717a"/>
  <!-- nose -->
  <line x1="60" y1="69" x2="57" y2="78" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="69" x2="63" y2="78" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- mouth -->
  <path d="M52 88 Q60 94 68 88" stroke="#a1a1aa" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="60" y="132" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#71717a">Diamond</text>
</svg>
